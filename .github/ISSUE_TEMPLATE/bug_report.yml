name: Bug Report
description: Report a bug in sast-json-schema
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal schema and command to reproduce the issue
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `npx sast-json-schema --version`"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Output of `node --version`"
    validations:
      required: true
