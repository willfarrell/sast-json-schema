name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.x

permissions:
  contents: read

jobs:
  build:
    name: Build
    if: ${{ github.event.pull_request.merged && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Set env
        run: |
          tag=$(npm pkg get version | xargs)
          printf 'tag=%s\n' "$tag" >> "$GITHUB_ENV"
          if [ "${tag##*-*}" ]; then prerelease=false; else prerelease=true; fi
          printf 'prerelease=%s\n' "$prerelease" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
      - name: Verify dependency signatures
        run: |
          npm audit signatures
      - name: Build
        run: |
          npm run build --if-present
      - name: Pack
        id: pack
        run: |
          {
            echo "packages<<EOF"
            npm pack --json
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Build Attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            *.tgz
      # upload-artifact is independently versioned from download-artifact; v7.0.1 is the latest major (no v8.x exists)
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.tag }}
          path: |
            package.json
            *.tgz
    outputs:
      tag: ${{ env.tag }}
      prerelease: ${{ env.prerelease }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning] no cache configured (no `cache:` input); reconsider if caching is added
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.tag }}
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions] prefer maintained action over inline `gh release` script
        with:
          draft: true
          prerelease: ${{ needs.build.outputs.prerelease }}
          tag_name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: |
            **/*.tgz
    outputs:
      tag: ${{ needs.build.outputs.tag }}
      prerelease: ${{ needs.build.outputs.prerelease }}

  publish:
    name: Publish
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm publish
      attestations: read # gh attestation verify
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-telemetry: true
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.release.outputs.tag }}
      - name: Verify build provenance attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find . -name '*.tgz' -print -exec gh attestation verify {} --repo ${{ github.repository }} \;
      - name: npm publish (next)
        if: ${{ needs.release.outputs.prerelease == 'true' }}
        run: |
          find . -name '*.tgz' -exec npm publish --tag next --provenance --access public {} \;
      - name: npm publish (latest)
        if: ${{ needs.release.outputs.prerelease == 'false' }}
        run: |
          find . -name '*.tgz' -exec npm publish --tag latest --provenance --access public {} \;
